name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: playwright-tests-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright-tests:
    name: playwright-tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CI: true

    steps:
      # Checkout repository code
      - name: Checkout
        uses: actions/checkout@v4

      # Setup latest LTS Node.js and Yarn cache
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: yarn

      # Install dependencies with strict lockfile/cache checks
      - name: Install dependencies
        run: yarn install --immutable --immutable-cache --check-cache

      # Install Playwright browsers and required system dependencies
      - name: Install Playwright browsers
        run: yarn playwright install --with-deps

      # Run Playwright test suite in parallel
      - name: Run Playwright tests
        run: yarn playwright test

      # Always upload Playwright HTML report
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-html-report
          path: playwright-report
          if-no-files-found: warn

      # Always upload Playwright traces
      - name: Upload Playwright traces
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: |
            test-results/**/trace*.zip
            test-results
          if-no-files-found: warn
